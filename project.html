    <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; line-height: 1.6; }

        /* Navigasi */
        header { background: #B39EFE; color: #fff; padding: 1rem 0; text-align: center; font-size: 18px }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; }
	nav a:hover { color:  #FE6D8C; text-decoration: none; }

#typing {
  color: #d946ef; /* ungu fuchsia biar nyambung sama tema */
  font-weight: bold;
}

.cursor {
  display: inline-block;
  animation: blink 0.7s infinite;
  color: #d946ef;
}

@keyframes blink {
 0%, 100% { opacity: 1; }
 50% { opacity: 0; }
}
        
        /* Banner Utama */
        .h1 { background: #f4f4f4; padding: 4rem 2rem; text-align: center; }
        .btn { display: inline-block; background: #FE6D8C; color: #fff; padding: 10px 20px; text-decoration: none; margin-top: 1rem; border-radius: 5px; }
	.btn:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(238, 77, 45, 0.6); }
	.btn-shopee { display: inline-block; padding: 12px 20px; background: #fe6d8c; color: white; font-weight: bold; font-size: 16px; text-decoration: none; border-radius: 50px; box shadow: 0 4px 12px rgba(238, 77, 45, 0.4); transition: 0.3s; }
	.btn-shopee:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(238, 77, 45, 0.6); }

        /* Produk */
        .products { padding: 2rem; }
        .products h2 { text-align: center; margin-bottom: 2rem; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { border: 1px solid #ddd; padding: 1rem; text-align: center; width: 250px; background: #fff; }
        .card img { width: 100%; height: 240px; object-fit: cover; margin-bottom: 1rem; }
        .price { font-weight: bold; color: #e91e63; margin: 0.5rem 0; }

        /* Footer */
        footer { background: #B39EFE; color: #fff; text-align: center; padding: 1rem 0; font-size: 18px; margin-top: 10rem; }
	footer a { color: #ffd93d; text-decoration: none; margin: 0 15px; transition: 0.3s; font-size: 18px }
	footer a:hover { color: BLACK; text-decoration: underline; }
    </style>

<script>
const text = "Rainbow Lovely Store ✨";
const typingElement = document.getElementById("typing");
let i = 0;

function ketik() {
  if (i < text.length) {
    typingElement.innerHTML += text.charAt(i);
    i++;
    setTimeout(ketik, 170); // 170ms = kecepatan ngetik. Makin kecil makin cepet
  }
}

// Jalanin pas halaman kebuka
window.addEventListener('load', ketik);
</script>
