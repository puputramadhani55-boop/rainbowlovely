<script>
const text = "Rainbow Lovely Store ✨";
const typingElement = document.getElementById("typing");
let i = 0;

function ketik() {
  if (i < text.length) {
    typingElement.innerHTML += text.charAt(i);
    i++;
    setTimeout(ketik, 170); // 170ms = kecepatan ngetik. Makin kecil makin cepet

}

// Jalanin pas halaman kebuka
window.addEventListener('load', ketik);
