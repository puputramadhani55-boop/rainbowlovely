<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=" width=device-width, initial-scale=1.0">
    <title>RainbowLovelyStore</title> 
<link rel="icon" href="picture/logo.jpeg">
<link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <nav>
            <a href="index.html">BERANDA</a>
            <a href="produk.html">PRODUK</a>
            <a href="tentangkami.html">TENTANG KAMI</a>
            <a href="kontak.html">KONTAK</a>
        </nav>
    </header>

<section id="beranda" class="section">
<div class="h1">
  <h1>Halo, aku <span id="typing"></span><span class="cursor">|</span></h1>
  <p>Manik - Manik handmade untuk hari kamu yang lebih cantik</p>
  <a href="produk.html" class="btn">Lihat Produk</a>
</div>
</section>

    <div class="products">
        <h2>Produk Unggulan</h2>
        <div class="grid" id="gridBeranda">
            <p style="text-align:center;color:#999;grid-column:1/-1;">Memuat produk...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Rainbow Lovely. All rights reserved</p>
<div class="medsos">
	<a href="link-shopee"> Shopee </a>
	<a href="link-ig"> Instagram </a>
	<a href="link-wa"> WhatsApp </a>
</div>

<script>
const text = "Rainbow Lovely Store ✨";
const typingElement = document.getElementById("typing");
let i = 0;

function ketik() {
  if (i < text.length) {
    typingElement.innerHTML += text.charAt(i);
    i++;
    setTimeout(ketik, 170);
  }
}

window.addEventListener('load', ketik);
</script>

<script>
const API_BASE = 'https://rainbow-lovely.vercel.app';

async function muatProduk(containerId, limit) {
  const grid = document.getElementById(containerId);
  if (!grid) return;
  try {
    const res = await fetch(API_BASE + '/api/list-products');
    const json = await res.json();
    let produk = json.products || [];
    if (limit) produk = produk.slice(0, limit);
    if (!produk.length) {
      grid.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;">Belum ada produk.</p>';
      return;
    }
    grid.innerHTML = produk.map(p => `
      <div class="card">
        <img src="${p.image_url || ''}" alt="${p.name}">
        <h3>${p.name}</h3>
        <div class="price">Rp ${Number(p.price || 0).toLocaleString('id-ID')}</div>
        <a href="${p.shopee_url || '#'}" target="_blank" class="btn-shopee">Beli di Shopee</a>
      </div>
    `).join('');
  } catch (err) {
    grid.innerHTML = '<p style="text-align:center;color:#c33;grid-column:1/-1;">Gagal memuat produk.</p>';
  }
}

muatProduk('gridBeranda', 4);
</script>

    </footer>

</body>
</html>
